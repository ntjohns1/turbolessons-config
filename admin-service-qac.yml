# QAC overlay for admin-service (profile: qac). Merged over admin-service.yml.
# QAC uses the dedicated Keycloak realm 'turbolessons-qac'; only the issuer differs.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac
keycloak:
  admin:
    realm: turbolessons-qac
    client-secret: '{cipher}'
