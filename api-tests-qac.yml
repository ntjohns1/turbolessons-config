# QAC overlay for api-tests (profile: qac). Merged over api-tests.yml.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac
      client:
        provider:
          okta:
            token-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac/protocol/openid-connect/token
        registration:
          okta:
            client-secret: '{cipher}'
