# QAC overlay for api-gateway (Spring profile: qac).
# The config server merges this OVER api-gateway.yml when a client requests
# profile "qac" (SPRING_PROFILES_ACTIVE=qac). Only values that differ from prod belong here.
# QAC uses the dedicated Keycloak realm 'turbolessons-qac'; login client-id (api-gateway) unchanged.

cors:
  allowed-origins:
    - https://qac.turbolessons.com
    - http://localhost:3000

spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-secret: '{cipher}'
        provider:
          keycloak:
            issuer-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac
