# QAC overlay for email-service (profile: qac). Merged over email-service.yml.
# M2M only (no resource server); client-id (email-service-m2m) unchanged.
spring:
  security:
    oauth2:
      client:
        provider:
          okta:
            token-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac/protocol/openid-connect/token
        registration:
          okta:
            client-secret: '{cipher}'
