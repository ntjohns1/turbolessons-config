management:
  endpoints:
    web:
      exposure:
        include: '*'
logging:
  level:
    root: INFO
spring:
  cloud:
    gateway:
      enabled: false
      redis:
        enabled: false
    discovery:
      enabled: false
  mustache:
    check-template-location: false
  jackson:
    mapper:
      propagate-transient-marker: true
  security:
    oauth2:
      client:
        provider:
          okta:
            token-uri: https://auth.nelsonjohns.com/realms/turbolessons/protocol/openid-connect/token
        registration:
          okta:
            authorization-grant-type: client_credentials
            client-id: api-tests-m2m
            client-secret: '{cipher}'
            scope: test_client
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/turbolessons
