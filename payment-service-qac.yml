# QAC overlay for payment-service (profile: qac). Merged over payment-service.yml.
# Dedicated Keycloak realm 'turbolessons-qac'; client-id (payment-service-m2m) unchanged.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac
      client:
        provider:
          okta:
            token-uri: https://auth.nelsonjohns.com/realms/turbolessons-qac/protocol/openid-connect/token
        registration:
          okta:
            client-secret: '{cipher}'
