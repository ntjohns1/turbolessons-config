management:
  endpoints:
    web:
      exposure:
        include: '*'
eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.nelsonjohns.com/realms/turbolessons
  cloud:
    gateway:
      enabled: false
      redis:
        enabled: false
  mustache:
    check-template-location: false
# admin-service -> Keycloak Admin REST API (KeycloakAdminProperties: keycloak.admin.*)
keycloak:
  admin:
    server-url: https://auth.nelsonjohns.com
    realm: turbolessons
    client-id: admin-service-kc
    client-secret: '{cipher}'
logging:
  level:
    root: INFO
    org:
      springframework: WARN
    com:
      noslen:
        adminservice: INFO