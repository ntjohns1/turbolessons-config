attachment:
  invoice: path_to_file
management:
  endpoints:
    web:
      exposure:
        include: '*'
eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/
spring:
  cloud:
    gateway:
      enabled: false
      redis:
        enabled: false
  data:
    mongodb:
      uri: mongodb://root:example@emaildb:27017/lsa_email?authSource=admin
  mail:
    host: smtp.gmail.com
    password: '{cipher}'
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    templates:
      path: mail-templates
    username: nelsontjohns@gmail.com
  main:
    web-application-type: none
  security:
    oauth2:
      client:
        provider:
          okta:
            token-uri: https://auth.nelsonjohns.com/realms/turbolessons/protocol/openid-connect/token
        registration:
          okta:
            authorization-grant-type: client_credentials
            client-id: email-service-m2m
            client-secret: '{cipher}'
            scope: email_client